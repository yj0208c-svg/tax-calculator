<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>종합소득세 계산기 (실무형)</title>
<style>
body{font-family:-apple-system; background:#f3f4f6; margin:0; padding:20px;}
.container{max-width:900px;margin:auto;}
.card{background:white;border-radius:16px;padding:20px;margin-bottom:20px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
input,select{padding:12px;border-radius:10px;border:1px solid #ccc;font-size:16px;width:100%;}
.result{display:grid;gap:10px;}
.row{display:flex;justify-content:space-between;padding:12px;background:#f9fafb;border-radius:10px;}
.bold{background:#111;color:white;}
@media(max-width:600px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="container">

<div class="card">
<h2>종합소득세 계산기</h2>

<div class="grid">
<div>
<label>당해연도 수입금액</label>
<input id="cy" type="number">
</div>

<div>
<label>전년도 수입금액</label>
<input id="py" type="number">
</div>

<div>
<label>가족 수</label>
<input id="fam" type="number" value="1">
</div>

<div>
<label>사업자 유형</label>
<select id="type">
<option value="C">면세사업자</option>
<option value="A">과세사업자</option>
</select>
</div>
</div>
</div>

<div class="card">
<h2>계산 결과</h2>
<div class="result" id="result"></div>
</div>

</div>

<script>
function n(v){return Number(v)||0}

function isDansoon(py){return py<36000000}
function isGanpyeon(cy,py){return cy<75000000&&py<75000000}
function isPenalty(py){return py>=48000000}

function expense(cy,py){
 if(isDansoon(py)){
  if(cy<=40000000)return cy*0.678
  return 40000000*0.678+(cy-40000000)*0.549
 }
 return cy*0.109
}

function income(cy,py,f){return cy-expense(cy,py)-f*1500000}

function tax(i){
 if(i<=14000000)return i*0.066
 if(i<=50000000)return i*0.165-1386000
 if(i<=88000000)return i*0.264-6336000
 if(i<=150000000)return i*0.385-16984000
 return i*0.418
}

function bookDeduction(cy,py,i){
 if(isGanpyeon(cy,py)){
  return Math.min(tax(i)*0.2,1000000)
 }
 return 0
}

function penalty(cy,py,i){
 if(!isPenalty(py))return 0
 if(isGanpyeon(cy,py)) return tax(i)*0.2
 return Math.max(tax(i)*0.2,cy*0.007)
}

function calc(){
 let cy=n(document.getElementById("cy").value)
 let py=n(document.getElementById("py").value)
 let f=n(document.getElementById("fam").value)
 let t=document.getElementById("type").value

 if(!cy&&!py){document.getElementById("result").innerHTML="입력하세요";return}

 let exp=expense(cy,py)
 let inc=income(cy,py,f)
 let sanchool=tax(inc)
 let book=bookDeduction(cy,py,inc)
 let pen=penalty(cy,py,inc)
 let gyeol=sanchool-book+pen
 let prepaid=t==="C"?cy*0.033:0
 let final=Math.max(gyeol-prepaid,0)

 document.getElementById("result").innerHTML=`
 <div class="row"><span>경비율</span><span>${isDansoon(py)?"단순":"기준"}</span></div>
 <div class="row"><span>수입금액</span><span>${cy.toLocaleString()}원</span></div>
 <div class="row"><span>필요경비</span><span>${exp.toLocaleString()}원</span></div>
 <div class="row"><span>소득공제</span><span>${(f*1500000).toLocaleString()}원</span></div>
 <div class="row"><span>과세표준</span><span>${inc.toLocaleString()}원</span></div>
 <div class="row"><span>산출세액</span><span>${sanchool.toLocaleString()}원</span></div>
 <div class="row"><span>기장세액공제</span><span>${book.toLocaleString()}원</span></div>
 <div class="row"><span>무기장가산세</span><span>${pen.toLocaleString()}원</span></div>
 <div class="row"><span>결정세액</span><span>${gyeol.toLocaleString()}원</span></div>
 <div class="row"><span>기납부세액</span><span>${prepaid.toLocaleString()}원</span></div>
 <div class="row bold"><span>차감납부세액</span><span>${final.toLocaleString()}원</span></div>
 `
}

["cy","py","fam","type"].forEach(id=>{
 document.getElementById(id).addEventListener("input",calc)
})

calc()
</script>

</body>
</html>
